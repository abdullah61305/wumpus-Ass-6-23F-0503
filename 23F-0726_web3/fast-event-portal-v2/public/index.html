<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FAST Fest 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background-color: #050a14;
        background-image:
          radial-gradient(ellipse at 20% 50%, rgba(0,255,200,0.04) 0%, transparent 60%),
          radial-gradient(ellipse at 80% 20%, rgba(0,150,255,0.05) 0%, transparent 50%);
        min-height: 100vh;
        font-family: 'Rajdhani', sans-serif;
        color: #c8d6e5;
      }
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: #050a14; }
      ::-webkit-scrollbar-thumb { background: #00ffc8; border-radius: 3px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
